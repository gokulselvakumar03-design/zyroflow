<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Track Approval Workflow</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
  </head>
  <body class="bg-light">
    <div class="container py-4">
      <div class="d-flex justify-content-between align-items-center mb-4">
        <h2>Track Approval Workflow</h2>
        <div>
          <a class="btn btn-sm btn-outline-primary" href="employee.html">Employee</a>
          <a class="btn btn-sm btn-outline-primary" href="approvals.html">Approver</a>
          <a class="btn btn-sm btn-outline-primary" href="admin-rules.html">Admin Rules</a>
          <button id="logout-btn" class="btn btn-sm btn-danger">Logout</button>
        </div>
      </div>

      <div id="track-alert" class="alert d-none" role="alert"></div>

      <div class="card mb-4">
        <div class="card-body">
          <form id="track-form" class="row g-3">
            <div class="col-md-6">
              <label for="request_id" class="form-label">Request ID</label>
              <input type="number" id="request_id" class="form-control" placeholder="Enter request ID" required>
            </div>
            <div class="col-md-2 d-flex align-items-end">
              <button type="submit" class="btn btn-primary w-100">Track Workflow</button>
            </div>
          </form>
        </div>
      </div>

      <div id="workflow" class="mb-4"></div>
    </div>

    <script src="track.js"></script>
  </body>
</html>
