<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Employee Dashboard - Approval Workflow</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 25%, #f093fb 50%, #4facfe 75%, #00f2fe 100%);
            background-size: 400% 400%;
            animation: gradient-shift 15s ease infinite;
            min-height: 100vh;
            padding: 20px;
        }

        @keyframes gradient-shift {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* Top Navigation */
        .navbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            padding: 20px 30px;
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(10px);
            border-radius: 15px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
        }

        .navbar-title {
            color: white;
            font-size: 24px;
            font-weight: 700;
        }

        .navbar-user {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .notification {
            display: flex;
            align-items: center;
            gap: 8px;
            color: rgba(255, 255, 255, 0.95);
            background: rgba(255, 255, 255, 0.12);
            border: 1px solid rgba(255, 255, 255, 0.25);
            border-radius: 999px;
            padding: 8px 12px;
            font-size: 13px;
            font-weight: 600;
        }

        .notif-count {
            min-width: 22px;
            height: 22px;
            border-radius: 999px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            background: rgba(255, 193, 7, 0.9);
            color: #1f2937;
            font-size: 12px;
            font-weight: 700;
        }

        .user-info {
            color: rgba(255, 255, 255, 0.9);
            font-size: 14px;
            text-align: right;
        }

        .user-role {
            font-weight: 600;
            text-transform: capitalize;
        }

        .welcome-text {
            color: rgba(255, 255, 255, 0.9);
            font-size: 13px;
        }

        .role-summary {
            color: rgba(255, 255, 255, 0.82);
            font-size: 12px;
            margin-top: 2px;
        }

        .logout-button {
            padding: 10px 20px;
            background: rgba(255, 107, 107, 0.8);
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s ease;
        }

        .logout-button:hover {
            background: rgba(255, 107, 107, 1);
            transform: scale(1.05);
        }

        /* Container */
        .container {
            max-width: 1200px;
            margin: 0 auto;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 30px;
        }

        /* Card Style */
        .card {
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(10px);
            border-radius: 15px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            padding: 30px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
        }

        .card-title {
            color: white;
            font-size: 20px;
            font-weight: 700;
            margin-bottom: 20px;
        }

        /* Form Styles */
        .form-group {
            margin-bottom: 20px;
        }

        .form-label {
            display: block;
            color: rgba(255, 255, 255, 0.9);
            font-size: 13px;
            font-weight: 600;
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .form-input,
        .form-select,
        .form-textarea {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid rgba(255, 255, 255, 0.2);
            border-radius: 8px;
            background: rgba(255, 255, 255, 0.2);
            color: white;
            font-size: 14px;
            font-family: inherit;
            transition: all 0.3s ease;
        }

        .form-input::placeholder,
        .form-textarea::placeholder {
            color: rgba(255, 255, 255, 0.6);
        }

        .form-select option {
            color: #1a1a1a;
        }

        .form-input:focus,
        .form-select:focus,
        .form-textarea:focus {
            outline: none;
            border-color: rgba(255, 255, 255, 0.6);
            background: rgba(255, 255, 255, 0.25);
            box-shadow: 0 0 15px rgba(255, 255, 255, 0.2);
        }

        .form-textarea {
            resize: vertical;
            min-height: 120px;
        }

        /* Button */
        .submit-button {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 1px;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
        }

        .submit-button:hover {
            transform: scale(1.02);
            box-shadow: 0 6px 20px rgba(102, 126, 234, 0.6);
        }

        .submit-button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        /* Request List */
        .requests-list {
            display: flex;
            flex-direction: column;
            gap: 15px;
            max-height: 400px;
            overflow-y: auto;
        }

        .list-controls {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-bottom: 14px;
            align-items: center;
        }

        .filters {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }

        .filter-button {
            border: 1px solid rgba(255, 255, 255, 0.35);
            background: rgba(255, 255, 255, 0.14);
            color: white;
            border-radius: 999px;
            padding: 7px 11px;
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.25s ease;
        }

        .filter-button:hover,
        .filter-button.active {
            background: rgba(255, 255, 255, 0.28);
            border-color: rgba(255, 255, 255, 0.6);
        }

        .search-box {
            flex: 1;
            min-width: 220px;
            padding: 10px 14px;
            border-radius: 10px;
            border: 1px solid rgba(255, 255, 255, 0.25);
            background: rgba(255, 255, 255, 0.2);
            color: white;
            font-size: 13px;
        }

        .search-box::placeholder {
            color: rgba(255, 255, 255, 0.62);
        }

        .search-box:focus {
            outline: none;
            border-color: rgba(255, 255, 255, 0.6);
            box-shadow: 0 0 10px rgba(255, 255, 255, 0.2);
        }

        .request-item {
            background: rgba(255, 255, 255, 0.1);
            padding: 15px;
            border-radius: 8px;
            border-left: 4px solid #667eea;
            color: white;
        }

        .request-card.pending { border-left: 4px solid #ff9800; }
        .request-card.approved { border-left: 4px solid #4caf50; }
        .request-card.rejected { border-left: 4px solid #f44336; }
        .request-card.cancelled { border-left: 4px solid #9ca3af; }

        .request-title {
            font-weight: 600;
            margin-bottom: 5px;
        }

        .request-status {
            font-size: 12px;
            text-transform: uppercase;
            margin-top: 10px;
            padding: 5px 10px;
            border-radius: 5px;
            display: inline-block;
            font-weight: 600;
        }

        .status-pending {
            background: rgba(255, 193, 7, 0.3);
            color: #ffc107;
        }

        .status-approved {
            background: rgba(76, 175, 80, 0.3);
            color: #4caf50;
        }

        .status-rejected {
            background: rgba(244, 67, 54, 0.3);
            color: #f44336;
        }

        .status-cancelled {
            background: rgba(148, 163, 184, 0.3);
            color: #e2e8f0;
        }

        .request-actions {
            margin-top: 10px;
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            align-items: center;
        }

        .cancel-btn {
            border: 1px solid rgba(244, 67, 54, 0.4);
            background: rgba(244, 67, 54, 0.2);
            color: #fecaca;
            border-radius: 8px;
            padding: 6px 10px;
            cursor: pointer;
            font-size: 12px;
            font-weight: 600;
        }

        .cancel-btn:hover {
            background: rgba(244, 67, 54, 0.3);
        }

        .cancel-hint {
            font-size: 12px;
            color: rgba(255, 255, 255, 0.8);
        }

        .smart-warning {
            margin-top: 8px;
            font-size: 12px;
            color: #fde68a;
        }

        .request-meta-line {
            font-size: 12px;
            color: rgba(255, 255, 255, 0.74);
            margin-top: 8px;
        }

        .workflow-tracker {
            margin-top: 10px;
            padding: 10px;
            border-radius: 8px;
            background: rgba(255, 255, 255, 0.08);
            font-size: 12px;
            line-height: 1.6;
        }

        .step {
            display: inline-block;
            padding: 5px 10px;
            border-radius: 20px;
            margin-right: 5px;
            margin-bottom: 4px;
            font-size: 12px;
            font-weight: 600;
        }

        .step.done { background: #4caf50; color: white; }
        .step.current { background: #ff9800; color: white; }
        .step.pending { background: #d1d5db; color: #111827; }

        .priority {
            padding: 4px 10px;
            border-radius: 12px;
            font-size: 11px;
            margin-left: 10px;
            font-weight: 700;
            letter-spacing: 0.3px;
        }

        .priority.high { background: #ef4444; color: white; }
        .priority.medium { background: #f59e0b; color: white; }
        .priority.low { background: #22c55e; color: white; }

        .status-message {
            margin-top: 8px;
            font-size: 13px;
            color: rgba(255, 255, 255, 0.92);
            font-weight: 600;
        }

        .timeline {
            margin-top: 10px;
            border-left: 2px solid rgba(255, 255, 255, 0.2);
            padding-left: 10px;
        }

        .timeline-item {
            margin-bottom: 8px;
            color: rgba(255, 255, 255, 0.88);
            font-size: 12px;
        }

        .history-item {
            font-size: 12px;
            margin: 3px 0;
            opacity: 0.85;
        }

        .overdue {
            color: #ff6b6b;
            font-weight: 700;
            margin-left: 8px;
        }

        .escalated {
            color: #ffd166;
            font-size: 12px;
            margin-left: 8px;
            font-weight: 700;
        }

        .toolbar-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 10px;
            margin-bottom: 14px;
        }

        .export-button {
            background: rgba(255, 255, 255, 0.14);
            border: 1px solid rgba(255, 255, 255, 0.22);
            color: white;
            border-radius: 10px;
            padding: 8px 12px;
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
        }

        .export-button:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        .timeline-time {
            color: rgba(255, 255, 255, 0.6);
            margin-left: 6px;
        }

        .empty-state {
            text-align: center;
            color: rgba(255, 255, 255, 0.6);
            padding: 30px 0;
        }

        /* Message */
        .message {
            padding: 12px 16px;
            border-radius: 8px;
            margin-bottom: 20px;
            display: none;
        }

        .message.show {
            display: block;
        }

        .success {
            background: rgba(76, 175, 80, 0.2);
            color: #4caf50;
            border: 1px solid rgba(76, 175, 80, 0.4);
        }

        .error {
            background: rgba(244, 67, 54, 0.2);
            color: #f44336;
            border: 1px solid rgba(244, 67, 54, 0.4);
        }

        /* Responsive */
        @media (max-width: 768px) {
            .container {
                grid-template-columns: 1fr;
            }

            .navbar {
                flex-direction: column;
                text-align: center;
                gap: 15px;
            }

            .navbar-user {
                width: 100%;
                gap: 10px;
                justify-content: center;
            }
        }
    </style>
</head>
<body>
    <!-- Navigation Bar -->
    <div class="navbar">
        <div class="navbar-title">Employee Dashboard</div>
        <div class="navbar-user">
            <div class="notification">🔔 <span id="notifCount" class="notif-count">0</span></div>
            <div class="user-info">
                <div id="welcomeText" class="welcome-text"></div>
                <div id="roleSummary" class="role-summary"></div>
            </div>
            <button class="logout-button" onclick="logout()">Logout</button>
        </div>
    </div>

    <!-- Main Content -->
    <div class="container">
        <!-- Submit Request Card -->
        <div class="card">
            <h2 class="card-title">Submit Request</h2>
            <div id="message" class="message"></div>

            <form id="request-form">
                <div class="form-group">
                    <label class="form-label" for="requestType">Request Type</label>
                    <select id="requestType" class="form-select" required>
                        <option value="">Select Request Type</option>
                        <option value="leave">Leave Request</option>
                        <option value="budget">Budget Approval</option>
                        <option value="equipment">Equipment Request</option>
                        <option value="travel">Travel Request</option>
                        <option value="reimbursement">Reimbursement</option>
                    </select>
                </div>

                <div id="dynamicFields"></div>

                <div class="form-group">
                    <label class="form-label" for="fileUpload">Attachment (optional)</label>
                    <input type="file" id="fileUpload" class="form-input">
                </div>

                <button type="submit" class="submit-button">Submit Request</button>
            </form>
        </div>

        <!-- My Requests Card -->
        <div class="card">
            <div class="toolbar-row">
                <h2 class="card-title" style="margin-bottom: 0;">My Requests</h2>
                <button class="export-button" onclick="exportCSV()">Export</button>
            </div>
            <div class="list-controls">
                <div class="filters">
                    <button class="filter-button active" data-filter="ALL" onclick="filterRequests('ALL')">All</button>
                    <button class="filter-button" data-filter="Pending" onclick="filterRequests('Pending')">Pending</button>
                    <button class="filter-button" data-filter="Approved" onclick="filterRequests('Approved')">Approved</button>
                    <button class="filter-button" data-filter="Rejected" onclick="filterRequests('Rejected')">Rejected</button>
                    <button class="filter-button" data-filter="Cancelled" onclick="filterRequests('Cancelled')">Cancelled</button>
                </div>
                <input type="text" id="searchBox" class="search-box" placeholder="Search requests..." oninput="renderRequests()" />
            </div>
            <div class="requests-list" id="requests-list">
                <div class="empty-state">No requests yet. Submit one to get started!</div>
            </div>
        </div>
    </div>

    <script>
        let currentFilter = 'ALL';
        const REQUESTS_API_URL = 'http://localhost:5000/requests';

        // Initialize
        document.addEventListener('DOMContentLoaded', () => {
            checkAuthentication();
            displayUserRole();
            setupDynamicRequestFields();
            scheduleCancelWindowExpiryForAll();
            loadRequests();
        });

        function readRequestsFromLocalStorage() {
            return JSON.parse(localStorage.getItem('requests') || '[]');
        }

        function writeRequestsToLocalStorage(requests, skipApiSync) {
            localStorage.setItem('requests', JSON.stringify(requests));
            if (!skipApiSync) {
                syncRequestsToApi(requests);
            }
        }

        function syncRequestsToApi(requests) {
            if (!Array.isArray(requests) || !requests.length) return;
            requests.forEach((req) => {
                fetch(REQUESTS_API_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(req),
                }).catch(() => {
                    // Keep local fallback behavior unchanged if backend is down.
                });
            });
        }

        async function saveRequestToBackend(request) {
            try {
                const response = await fetch('http://localhost:4000/requests', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(request)
                });
                const data = await response.json();
                console.log('Saved to DB');
                return data && data.id ? Number(data.id) : null;
            } catch (err) {
                console.log('API failed, using localStorage fallback');
                return null;
            }
        }

        async function saveHistory(requestId, action, user) {
            const normalizedRequestId = Number(requestId);
            if (!Number.isInteger(normalizedRequestId) || normalizedRequestId <= 0) return;
            try {
                await fetch('http://localhost:4000/history', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        request_id: normalizedRequestId,
                        action: action,
                        performed_by: user
                    })
                });
                console.log('History saved to DB');
            } catch (error) {
                console.log('History API failed, fallback only local history');
            }
        }

        async function fetchApprovalSteps(requestId) {
            try {
                const res = await fetch(`http://localhost:4000/approvals/${requestId}`);
                if (!res.ok) return [];
                const steps = await res.json();
                return Array.isArray(steps) ? steps : [];
            } catch (err) {
                return [];
            }
        }

        function getCurrentLevel(request) {
            return Number(request.current_level ?? request.currentLevel ?? 0);
        }

        function loadRequests() {
            fetch(REQUESTS_API_URL)
                .then((res) => {
                    if (!res.ok) {
                        throw new Error('API request failed');
                    }
                    return res.json();
                })
                .then(async (data) => {
                    const requests = (Array.isArray(data) ? data : []).map((request) => {
                        const parsedRequest = { ...request };
                        if (typeof parsedRequest.workflow === 'string') {
                            try {
                                parsedRequest.workflow = JSON.parse(parsedRequest.workflow);
                            } catch (error) {
                                parsedRequest.workflow = [];
                            }
                        }
                        if (!Array.isArray(parsedRequest.workflow)) {
                            parsedRequest.workflow = [];
                        }
                        parsedRequest.current_level = getCurrentLevel(parsedRequest);
                        return parsedRequest;
                    });
                    const withSteps = await Promise.all(requests.map(async (request) => {
                        const steps = await fetchApprovalSteps(request.id);
                        if (!steps.length) return request;
                        const workflow = steps.map((step) => step.approver_role);
                        const pending = steps.find((step) => String(step.status || '').toLowerCase() === 'pending');
                        const hasRejected = steps.some((step) => String(step.status || '').toLowerCase() === 'rejected');
                        const allApproved = steps.length > 0 && steps.every((step) => String(step.status || '').toLowerCase() === 'approved');
                        return {
                            ...request,
                            workflow,
                            current_level: pending ? Number(pending.step || 0) : Math.max(0, workflow.length - 1),
                            status: hasRejected ? 'rejected' : (allApproved ? 'approved' : (request.status || 'pending'))
                        };
                    }));
                    writeRequestsToLocalStorage(withSteps, true);
                    renderRequests();
                })
                .catch(() => {
                    renderRequests();
                });
        }

        function normalizeRole(role) {
            const raw = String(role || '').trim().toLowerCase();
            if (raw === 'accounts') return 'Accounts';
            if (raw === 'manager') return 'Manager';
            if (raw === 'cfo') return 'CFO';
            if (raw === 'md') return 'MD';
            if (raw === 'admin') return 'Admin';
            return 'Employee';
        }

        function normalizeStatus(status) {
            return String(status || '').trim().toLowerCase();
        }

        function getRequestCurrentRole(request) {
            const workflow = Array.isArray(request.workflow) ? request.workflow : [];
            const idx = getCurrentLevel(request);
            return canonicalRole(request.currentRole || workflow[idx] || '');
        }

        function canonicalRole(roleValue) {
            const raw = String(roleValue || '').trim().toLowerCase();
            if (raw === 'accounts') return 'Accounts';
            if (raw === 'manager') return 'Manager';
            if (raw === 'cfo') return 'CFO';
            if (raw === 'md') return 'MD';
            if (raw === 'admin') return 'Admin';
            if (raw === 'employee') return 'Employee';
            return roleValue || '';
        }

        function updateNotifications(requests, userRole) {
            const role = canonicalRole(userRole);
            const userEmail = localStorage.getItem('userEmail');
            let pending = requests.filter((r) => normalizeStatus(r.status) === 'pending' && getRequestCurrentRole(r) === role).length;

            if (role === 'Employee' && userEmail) {
                pending = requests.filter((r) => normalizeStatus(r.status) === 'pending' && String(r.email || '') === userEmail).length;
            }

            const counter = document.getElementById('notifCount');
            if (counter) counter.innerText = String(pending);
        }

        function renderSummary(requests, role) {
            const normalizedRole = canonicalRole(role);
            const userEmail = localStorage.getItem('userEmail');
            let summary = '';

            if (normalizedRole === 'Employee') {
                const approved = requests.filter((r) => normalizeStatus(r.status) === 'approved' && String(r.email || '') === String(userEmail || '')).length;
                const pending = requests.filter((r) => normalizeStatus(r.status) === 'pending' && String(r.email || '') === String(userEmail || '')).length;
                summary = `Approved: ${approved} | Pending: ${pending}`;
            }

            if (normalizedRole !== 'Employee') {
                const pending = requests.filter((r) => getRequestCurrentRole(r) === normalizedRole && normalizeStatus(r.status) === 'pending').length;
                summary = `You have ${pending} approvals pending`;
            }

            const roleSummary = document.getElementById('roleSummary');
            if (roleSummary) roleSummary.innerText = summary;
        }

        function simulateEmail(action, role) {
            console.log(`Email sent to ${role || 'next approver'} for ${action}`);
        }

        function addSLA(request) {
            if (!request.deadline && request.createdAt) {
                request.deadline = Number(request.createdAt) + (24 * 60 * 60 * 1000);
            }
        }

        function checkSLA(request) {
            return Number(request.deadline || 0) > 0 && Date.now() > Number(request.deadline);
        }

        function checkEscalation(request) {
            if (normalizeStatus(request.status) !== 'pending') return false;
            if (!checkSLA(request)) return false;
            const workflow = Array.isArray(request.workflow) ? request.workflow : [];
            const cfoIndex = workflow.findIndex((role) => canonicalRole(role) === 'CFO');
            if (cfoIndex === -1 || getCurrentLevel(request) >= cfoIndex) return false;
            request.current_level = cfoIndex;
            delete request.currentLevel;
            request.currentRole = 'CFO';
            request.escalated = true;
            request.updatedAt = Date.now();
            return true;
        }

        function addHistory(request, action, user) {
            if (!Array.isArray(request.history)) request.history = [];
            request.history.push({
                action,
                user,
                role: user,
                status: action,
                time: Date.now()
            });
        }

        // Check if user is logged in
        function checkAuthentication() {
            const currentUser = JSON.parse(localStorage.getItem('currentUser') || 'null');
            const userRole = (currentUser && currentUser.role) || localStorage.getItem('role') || localStorage.getItem('userRole');
            if (!currentUser && !userRole) {
                window.location.href = 'login.html';
            }
            if (!localStorage.getItem('role')) {
                localStorage.setItem('role', String(userRole));
            }
            if (!localStorage.getItem('userRole')) {
                localStorage.setItem('userRole', String(userRole).toLowerCase());
            }
        }

        // Display user role
        function displayUserRole() {
            const currentUser = JSON.parse(localStorage.getItem('currentUser') || 'null');
            const userRole = normalizeRole((currentUser && currentUser.role) || localStorage.getItem('role') || localStorage.getItem('userRole'));
            const welcomeText = document.getElementById('welcomeText');
            if (welcomeText) {
                welcomeText.textContent = `Welcome ${userRole}`;
            }
        }

        function getWorkflows() {
            return JSON.parse(localStorage.getItem('workflows') || '[]');
        }

        const defaultWorkflowMap = {
            leave: ['Manager'],
            budget: ['Accounts', 'Manager', 'CFO', 'MD'],
            travel: ['Manager', 'Accounts'],
            reimbursement: ['Accounts', 'CFO'],
            equipment: ['Manager', 'Accounts']
        };

        function getRequestTypeLabel(type) {
            const labels = {
                leave: 'Leave Request',
                budget: 'Budget Approval',
                equipment: 'Equipment Request',
                travel: 'Travel Request',
                reimbursement: 'Reimbursement',
                legacy: 'Legacy Request'
            };
            return labels[type] || 'General Request';
        }

        function setupDynamicRequestFields() {
            const requestTypeEl = document.getElementById('requestType');
            if (!requestTypeEl) return;

            requestTypeEl.addEventListener('change', () => {
                renderDynamicFields(requestTypeEl.value);
            });
        }

        function renderDynamicFields(type) {
            const dynamicFields = document.getElementById('dynamicFields');
            if (!dynamicFields) return;

            dynamicFields.innerHTML = '';

            if (type === 'leave') {
                dynamicFields.innerHTML = `
                    <div class="form-group">
                        <label class="form-label" for="desc">Description</label>
                        <textarea id="desc" class="form-textarea" placeholder="Describe your leave request" required></textarea>
                    </div>
                    <div class="form-group">
                        <label class="form-label" for="startDate">Start Date</label>
                        <input type="date" id="startDate" class="form-input" required>
                    </div>
                    <div class="form-group">
                        <label class="form-label" for="endDate">End Date</label>
                        <input type="date" id="endDate" class="form-input" required>
                    </div>
                `;
            }

            if (type === 'budget') {
                dynamicFields.innerHTML = `
                    <div class="form-group">
                        <label class="form-label" for="amount">Amount</label>
                        <input type="number" id="amount" min="0" step="0.01" class="form-input" placeholder="Enter amount" required>
                    </div>
                    <div class="form-group">
                        <label class="form-label" for="desc">Description</label>
                        <textarea id="desc" class="form-textarea" placeholder="Budget purpose" required></textarea>
                    </div>
                `;
            }

            if (type === 'equipment') {
                dynamicFields.innerHTML = `
                    <div class="form-group">
                        <label class="form-label" for="item">Item Name</label>
                        <input id="item" class="form-input" placeholder="Laptop, Monitor, etc." required>
                    </div>
                    <div class="form-group">
                        <label class="form-label" for="qty">Quantity</label>
                        <input id="qty" type="number" min="1" class="form-input" placeholder="Quantity" required>
                    </div>
                    <div class="form-group">
                        <label class="form-label" for="desc">Reason</label>
                        <textarea id="desc" class="form-textarea" placeholder="Why this is needed" required></textarea>
                    </div>
                `;
            }

            if (type === 'travel') {
                dynamicFields.innerHTML = `
                    <div class="form-group">
                        <label class="form-label" for="destination">Destination</label>
                        <input id="destination" class="form-input" placeholder="City / Country" required>
                    </div>
                    <div class="form-group">
                        <label class="form-label" for="travelDate">Travel Date</label>
                        <input type="date" id="travelDate" class="form-input" required>
                    </div>
                    <div class="form-group">
                        <label class="form-label" for="amount">Estimated Cost</label>
                        <input id="amount" type="number" min="0" step="0.01" class="form-input" placeholder="Estimated cost" required>
                    </div>
                    <div class="form-group">
                        <label class="form-label" for="desc">Description</label>
                        <textarea id="desc" class="form-textarea" placeholder="Travel details" required></textarea>
                    </div>
                `;
            }

            if (type === 'reimbursement') {
                dynamicFields.innerHTML = `
                    <div class="form-group">
                        <label class="form-label" for="amount">Amount</label>
                        <input id="amount" type="number" min="0" step="0.01" class="form-input" placeholder="Claim amount" required>
                    </div>
                    <div class="form-group">
                        <label class="form-label" for="bill">Bill Details</label>
                        <textarea id="bill" class="form-textarea" placeholder="Bill / invoice details" required></textarea>
                    </div>
                    <div class="form-group">
                        <label class="form-label" for="desc">Description</label>
                        <textarea id="desc" class="form-textarea" placeholder="Additional details" required></textarea>
                    </div>
                `;
            }
        }

        function getDefaultWorkflow(type) {
            const base = defaultWorkflowMap[type] || [];
            return [...base];
        }

        function collectDynamicData(type) {
            const data = {};
            const addIfPresent = (id) => {
                const el = document.getElementById(id);
                if (el) data[id] = String(el.value || '').trim();
            };

            addIfPresent('desc');
            addIfPresent('startDate');
            addIfPresent('endDate');
            addIfPresent('item');
            addIfPresent('qty');
            addIfPresent('destination');
            addIfPresent('travelDate');
            addIfPresent('bill');

            const amountEl = document.getElementById('amount');
            if (amountEl) {
                data.amount = Number(amountEl.value || 0);
            }

            return data;
        }

        function normalizeRequest(request) {
            const workflow = Array.isArray(request.workflow) ? request.workflow : [];
            const createdAt = request.createdAt || Date.now();
            const normalizedType = request.type || 'legacy';
            const fallbackWorkflow = workflow.length ? workflow : getDefaultWorkflow(normalizedType);
            const currentLevel = getCurrentLevel(request);
            const cancelWindowActive = request.cancelWindowActive === true && (Date.now() - Number(createdAt) < 25000);
            return {
                ...request,
                type: normalizedType,
                dynamicData: request.dynamicData || null,
                amount: Number(request.amount || 0),
                status: normalizeStatus(request.status || 'pending'),
                current_level: currentLevel,
                workflow: fallbackWorkflow,
                createdAt,
                updatedAt: request.updatedAt || createdAt,
                history: Array.isArray(request.history) ? request.history : [],
                comments: Array.isArray(request.comments) ? request.comments : [],
                cancelWindowActive,
                deadline: Number(request.deadline || (Number(createdAt) + (24 * 60 * 60 * 1000))),
                currentRole: request.currentRole || fallbackWorkflow[currentLevel] || '',
                escalated: Boolean(request.escalated),
                fileName: request.fileName || null
            };
        }

        function persistRequestWindowFlag(requestId, isActive) {
            const requests = readRequestsFromLocalStorage();
            const nextRequests = requests.map((r) => {
                if (Number(r.id) !== Number(requestId)) return r;
                return { ...r, cancelWindowActive: Boolean(isActive) };
            });
            writeRequestsToLocalStorage(nextRequests);
        }

        function startCancelWindowTimer(requestId) {
            setTimeout(() => {
                persistRequestWindowFlag(requestId, false);
                renderRequests();
            }, 25000);
        }

        function scheduleCancelWindowExpiryForAll() {
            const requests = readRequestsFromLocalStorage();
            requests.forEach((r) => {
                if (normalizeStatus(r.status) !== 'pending' || r.cancelWindowActive !== true) {
                    return;
                }

                const createdAt = Number(r.createdAt || 0);
                const ageMs = Date.now() - createdAt;
                const remainingMs = 25000 - ageMs;

                if (remainingMs <= 0) {
                    persistRequestWindowFlag(r.id, false);
                    return;
                }

                setTimeout(() => {
                    persistRequestWindowFlag(r.id, false);
                    renderRequests();
                }, remainingMs);
            });
        }

        function getTimeAgo(timestamp) {
            const now = Date.now();
            const diff = Math.floor((now - Number(timestamp || now)) / 1000);

            if (diff < 60) return 'Just now';

            const minutes = Math.floor(diff / 60);
            if (minutes < 60) return `${minutes} minutes`;

            const hours = Math.floor(minutes / 60);
            if (hours < 24) return `${hours} hours`;

            const days = Math.floor(hours / 24);
            return `${days} days`;
        }

        function shouldShowLongPendingSuggestion(request) {
            const status = normalizeStatus(request.status);
            if (status !== 'pending') return false;
            const createdAt = Number(request.createdAt || Date.now());
            const timePassed = (Date.now() - createdAt) / (1000 * 60 * 60 * 24);
            return timePassed >= 1;
        }

        async function cancelRequest(requestId) {
            const requests = readRequestsFromLocalStorage();
            const requestIndex = requests.findIndex((r) => Number(r.id) === Number(requestId));

            if (requestIndex === -1) {
                showMessage('Request not found', 'error');
                return;
            }

            const request = normalizeRequest(requests[requestIndex]);
            if (normalizeStatus(request.status) !== 'pending') {
                alert('Cannot cancel this request');
                return;
            }

            requests[requestIndex] = {
                ...requests[requestIndex],
                status: 'Cancelled',
                cancelledAt: Date.now(),
                updatedAt: Date.now(),
                cancelWindowActive: false
            };
            addHistory(requests[requestIndex], 'Cancelled', 'Employee');
            await saveHistory(requestId, 'Cancelled', localStorage.getItem('userEmail'));

            writeRequestsToLocalStorage(requests);
            showMessage('Request cancelled successfully', 'success');
            loadRequests();
        }

        // Handle form submission
        document.getElementById('request-form').addEventListener('submit', async (e) => {
            e.preventDefault();

            const typeEl = document.getElementById('requestType');
            const type = typeEl ? typeEl.value : '';
            if (!type) {
                showMessage('Please select request type', 'error');
                return;
            }

            const details = collectDynamicData(type);
            const amount = Number(details.amount || 0);
            const description = String(details.desc || '').trim();
            const title = getRequestTypeLabel(type);
            const fileEl = document.getElementById('fileUpload');
            const file = fileEl && fileEl.files ? fileEl.files[0] : null;

            if (!description) {
                showMessage('Please fill required details for selected type', 'error');
                return;
            }

            if (amount < 0) {
                showMessage('Amount cannot be negative', 'error');
                return;
            }

            const adminWorkflows = getWorkflows();
            const matchedWorkflow = adminWorkflows.find((w) => w && w.type === type);

            let chosenWorkflow;

            if (matchedWorkflow && Array.isArray(matchedWorkflow.levels) && matchedWorkflow.levels.length) {
                chosenWorkflow = [...matchedWorkflow.levels];
            } else {
                chosenWorkflow = getDefaultWorkflow(type);
            }

            if (type === 'budget') {
                if (amount < 50000) {
                    chosenWorkflow = ['Accounts'];
                } else if (amount <= 100000) {
                    chosenWorkflow = ['Accounts', 'Manager'];
                } else {
                    chosenWorkflow = ['Accounts', 'Manager', 'CFO', 'MD'];
                }
            }

            if (!chosenWorkflow.length) {
                showMessage('No workflow available for this request. Ask admin to configure one.', 'error');
                return;
            }

            console.log('Request Type:', type);
            console.log('Workflow Applied:', chosenWorkflow);

            // Create request object
            const request = {
                id: Date.now(),
                type,
                title,
                description,
                amount,
                dynamicData: details,
                status: 'pending',
                current_level: 0,
                workflow: chosenWorkflow,
                createdAt: Date.now(),
                updatedAt: Date.now(),
                history: [],
                comments: [],
                undoUsed: false,
                undoAvailable: false,
                cancelWindowActive: true,
                email: localStorage.getItem('userEmail'),
                workflowName: matchedWorkflow ? matchedWorkflow.name : 'Default Workflow',
                fileName: file ? file.name : null,
                escalated: false
            };

            const requestToSend = {
                title: request.title,
                type: request.type,
                description: request.description,
                amount: request.amount,
                status: request.status,
                workflow: JSON.stringify(request.workflow),
                current_level: request.current_level
            };

            const dbRequestId = await saveRequestToBackend(requestToSend);
            if (dbRequestId) {
                request.id = dbRequestId;
            }

            addSLA(request);
            addHistory(request, 'Submitted', 'Employee');
            simulateEmail('submission', chosenWorkflow[0]);

            // Save to localStorage
            let requests = readRequestsFromLocalStorage();
            requests.push(request);
            writeRequestsToLocalStorage(requests, true);
            if (dbRequestId) {
                await saveHistory(dbRequestId, 'Request Created', localStorage.getItem('userEmail'));
            }
            startCancelWindowTimer(request.id);

            showMessage('Request submitted successfully!', 'success');
            document.getElementById('request-form').reset();
            renderDynamicFields('');
            loadRequests();

            // Clear message after 3 seconds
            setTimeout(() => {
                document.getElementById('message').classList.remove('show');
            }, 3000);
        });

        async function renderRequests() {
            const requests = readRequestsFromLocalStorage().map(normalizeRequest);
            let hasEscalationChanges = false;
            for (const r of requests) {
                if (checkEscalation(r)) {
                    hasEscalationChanges = true;
                    addHistory(r, 'Escalated to CFO', 'System');
                    await saveHistory(r.id, 'Escalated', 'System');
                    simulateEmail('escalation', 'CFO');
                }
            }
            if (hasEscalationChanges) {
                writeRequestsToLocalStorage(requests);
            }

            const currentUser = JSON.parse(localStorage.getItem('currentUser') || 'null');
            updateNotifications(requests, (currentUser && currentUser.role) || 'employee');
            renderSummary(requests, (currentUser && currentUser.role) || 'Employee');

            const userEmail = localStorage.getItem('userEmail');
            const userRequests = requests
                .filter(r => r.email === userEmail)
                .sort((a, b) => Number(b.createdAt) - Number(a.createdAt));

            const filteredRequests = userRequests
                .filter(r => currentFilter === 'ALL' || toStatusLabel(r.status) === currentFilter)
                .filter(matchesSearch);

            const requestsList = document.getElementById('requests-list');

            updateActiveFilterButtons();
            
            if (userRequests.length === 0) {
                requestsList.innerHTML = '<div class="empty-state">No requests yet. Submit one to get started!</div>';
                return;
            }

            if (filteredRequests.length === 0) {
                requestsList.innerHTML = '<div class="empty-state">No requests match your current filter/search.</div>';
                return;
            }

            requestsList.innerHTML = filteredRequests.map(request => `
                <div class="request-item request-card ${normalizeStatus(request.status)}">
                    <div class="request-title">${escapeHtml(request.title)} ${renderPriority(request.amount)}</div>
                    <div style="font-size: 13px; color: rgba(255,255,255,0.78); margin-bottom: 8px;">
                        ${escapeHtml(request.description)}
                    </div>
                    <div class="request-meta-line">Type: ${escapeHtml(getRequestTypeLabel(request.type))}</div>
                    <div class="request-meta-line">Amount: ${formatCurrency(request.amount)} | Template: ${escapeHtml(request.workflowName || 'N/A')}</div>
                    ${request.fileName ? `<div class="request-meta-line">📎 ${escapeHtml(request.fileName)}</div>` : ''}
                    <div class="status-message">${escapeHtml(getStatusMessage(request))}</div>
                    ${renderDynamicData(request)}
                    <div class="request-meta-line">Created ${timeAgo(request.createdAt)} | Updated ${timeAgo(request.updatedAt)}</div>
                    <div class="request-meta-line">${statusText(request)}${checkSLA(request) ? '<span class="overdue">⚠ Overdue</span>' : ''}${request.escalated ? '<span class="escalated">🚨 Escalated to CFO</span>' : ''}</div>
                    ${shouldShowLongPendingSuggestion(request) ? '<div class="smart-warning">⚠️ This request is pending for long time. You may cancel if not needed.</div>' : ''}
                    ${normalizeStatus(request.status) === 'pending' ? `<div class="request-actions"><button class="cancel-btn" onclick="cancelRequest(${Number(request.id)})">Cancel</button>${request.cancelWindowActive ? '<span class="cancel-hint">Quick cancel available (25s)</span>' : ''}</div>` : ''}
                    <div class="workflow-tracker">
                        <strong>Workflow:</strong> ${renderWorkflowTimeline(request.workflow, getCurrentLevel(request), request.status)}
                    </div>
                    <div class="timeline">
                        ${renderHistory(request.history)}
                    </div>
                    <span class="request-status status-${request.status}">${request.status}</span>
                </div>
            `).join('');
        }

        function filterRequests(status) {
            currentFilter = status;
            renderRequests();
        }

        function matchesSearch(request) {
            const q = String((document.getElementById('searchBox') || {}).value || '').toLowerCase().trim();
            if (!q) return true;
            const title = String(request.title || '').toLowerCase();
            const type = String(request.type || '').toLowerCase();
            return title.includes(q) || type.includes(q);
        }

        function updateActiveFilterButtons() {
            const buttons = document.querySelectorAll('.filter-button');
            buttons.forEach((btn) => {
                if (btn.dataset.filter === currentFilter) {
                    btn.classList.add('active');
                } else {
                    btn.classList.remove('active');
                }
            });
        }

        function toStatusLabel(status) {
            const normalized = normalizeStatus(status);
            if (!normalized) return 'Pending';
            return `${normalized.charAt(0).toUpperCase()}${normalized.slice(1)}`;
        }

        function getPriority(amount) {
            if (!amount) return 'LOW';
            if (Number(amount) > 100000) return 'HIGH';
            if (Number(amount) > 50000) return 'MEDIUM';
            return 'LOW';
        }

        function renderPriority(amount) {
            const p = getPriority(amount);
            return `<span class="priority ${p.toLowerCase()}">${p}</span>`;
        }

        function getStatusMessage(request) {
            const status = toStatusLabel(request.status);
            if (status === 'Approved') return 'Fully Approved';
            if (status === 'Rejected') return 'Rejected';
            if (status === 'Cancelled') return 'Cancelled';
            return `Waiting for ${(request.workflow || [])[getCurrentLevel(request)] || 'next approver'}`;
        }

        function renderDynamicData(request) {
            const data = request.dynamicData;
            if (!data || typeof data !== 'object') {
                return '';
            }

            const map = [
                ['startDate', 'Start Date'],
                ['endDate', 'End Date'],
                ['item', 'Item'],
                ['qty', 'Quantity'],
                ['destination', 'Destination'],
                ['travelDate', 'Travel Date'],
                ['bill', 'Bill']
            ];

            const lines = map
                .filter(([key]) => data[key])
                .map(([key, label]) => `<div class="request-meta-line">${label}: ${escapeHtml(String(data[key]))}</div>`);

            return lines.join('');
        }

        function statusText(request) {
            const status = normalizeStatus(request.status);
            if (status === 'approved') {
                return `Approved ${timeAgo(request.updatedAt)}`;
            }
            if (status === 'rejected') {
                return `Rejected ${timeAgo(request.updatedAt)}`;
            }
            if (status === 'cancelled') {
                return `Cancelled ${timeAgo(request.cancelledAt || request.updatedAt)}`;
            }
            return `Pending for ${getTimeAgo(request.createdAt)}`;
        }

        function renderWorkflowTimeline(workflow, currentIndex, status) {
            const normalizedWorkflow = Array.isArray(workflow) ? workflow : [];
            const normalizedStatus = normalizeStatus(status);
            return normalizedWorkflow.map((role, index) => {
                const doneByStatus = normalizedStatus === 'approved' || (normalizedStatus === 'cancelled' && index < currentIndex);
                if (index < currentIndex || doneByStatus) {
                    return `<span class="step done">✔ ${escapeHtml(role)}</span>`;
                }
                if (index === currentIndex && normalizedStatus === 'pending') {
                    return `<span class="step current">⏳ ${escapeHtml(role)}</span>`;
                }
                if (index === currentIndex && normalizedStatus === 'rejected') {
                    return `<span class="step current">✕ ${escapeHtml(role)}</span>`;
                }
                return `<span class="step pending">○ ${escapeHtml(role)}</span>`;
            }).join(' → ');
        }

        function renderHistory(history) {
            if (!Array.isArray(history) || history.length === 0) {
                return '<div class="history-item">No approval history yet.</div>';
            }
            return history.map((h) => {
                const action = String(h.status || h.action || 'Updated');
                const actor = h.role || h.user || 'System';
                return `<div class="history-item">✔ ${escapeHtml(actor)} ${escapeHtml(action)} (${timeAgo(h.time)})</div>`;
            }).join('');
        }

        function exportCSV() {
            const requests = readRequestsFromLocalStorage().map(normalizeRequest);
            const userEmail = localStorage.getItem('userEmail');
            const ownRequests = requests.filter((r) => String(r.email || '') === String(userEmail || ''));
            let csv = 'Title,Status,Amount\n';
            ownRequests.forEach((r) => {
                csv += `${String(r.title || '').replace(/,/g, ' ')},${toStatusLabel(r.status)},${Number(r.amount || 0)}\n`;
            });

            const blob = new Blob([csv], { type: 'text/csv' });
            const a = document.createElement('a');
            a.href = URL.createObjectURL(blob);
            a.download = 'requests.csv';
            a.click();
            URL.revokeObjectURL(a.href);
        }

        function timeAgo(timestamp) {
            let time = Number(timestamp);
            if (!Number.isFinite(time)) {
                const parsed = Date.parse(String(timestamp || ''));
                time = Number.isFinite(parsed) ? parsed : Date.now();
            }
            const diffSeconds = Math.max(0, Math.floor((Date.now() - time) / 1000));
            if (diffSeconds < 60) return `${diffSeconds}s ago`;
            const mins = Math.floor(diffSeconds / 60);
            if (mins < 60) return `${mins} min${mins === 1 ? '' : 's'} ago`;
            const hours = Math.floor(mins / 60);
            if (hours < 24) return `${hours} hour${hours === 1 ? '' : 's'} ago`;
            const days = Math.floor(hours / 24);
            return `${days} day${days === 1 ? '' : 's'} ago`;
        }

        function formatCurrency(amount) {
            return `$${Number(amount || 0).toLocaleString(undefined, { maximumFractionDigits: 2 })}`;
        }

        // Show message
        function showMessage(text, type) {
            const messageEl = document.getElementById('message');
            messageEl.textContent = text;
            messageEl.className = `message show ${type}`;
        }

        // Escape HTML to prevent XSS
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // Logout
        function logout() {
            localStorage.removeItem('authToken');
            localStorage.removeItem('role');
            localStorage.removeItem('userRole');
            localStorage.removeItem('userEmail');
            window.location.href = 'login.html';
        }
    </script>
</body>
</html>
