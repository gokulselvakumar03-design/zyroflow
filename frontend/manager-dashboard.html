<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manager Dashboard - Approval Workflow</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 25%, #f093fb 50%, #4facfe 75%, #00f2fe 100%);
            background-size: 400% 400%;
            animation: gradient-shift 15s ease infinite;
            min-height: 100vh;
            padding: 20px;
        }

        @keyframes gradient-shift {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* Top Navigation */
        .navbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            padding: 20px 30px;
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(10px);
            border-radius: 15px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
        }

        .navbar-title {
            color: white;
            font-size: 24px;
            font-weight: 700;
        }

        .navbar-user {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .notification {
            display: flex;
            align-items: center;
            gap: 8px;
            color: rgba(255, 255, 255, 0.95);
            background: rgba(255, 255, 255, 0.12);
            border: 1px solid rgba(255, 255, 255, 0.25);
            border-radius: 999px;
            padding: 8px 12px;
            font-size: 13px;
            font-weight: 600;
        }

        .notif-count {
            min-width: 22px;
            height: 22px;
            border-radius: 999px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            background: rgba(255, 193, 7, 0.9);
            color: #1f2937;
            font-size: 12px;
            font-weight: 700;
        }

        .user-info {
            color: rgba(255, 255, 255, 0.9);
            font-size: 14px;
            text-align: right;
        }

        .user-role {
            font-weight: 600;
            text-transform: capitalize;
        }

        .welcome-text {
            color: rgba(255, 255, 255, 0.9);
            font-size: 13px;
        }

        .role-summary {
            color: rgba(255, 255, 255, 0.82);
            font-size: 12px;
            margin-top: 2px;
        }

        .logout-button {
            padding: 10px 20px;
            background: rgba(255, 107, 107, 0.8);
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s ease;
        }

        .logout-button:hover {
            background: rgba(255, 107, 107, 1);
            transform: scale(1.05);
        }

        /* Container */
        .container {
            max-width: 1000px;
            margin: 0 auto;
        }

        /* Card Style */
        .card {
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(10px);
            border-radius: 15px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            padding: 30px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
            margin-bottom: 30px;
        }

        .card-title {
            color: white;
            font-size: 20px;
            font-weight: 700;
            margin-bottom: 20px;
        }

        /* Requests List */
        .requests-list {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .list-controls {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            margin-bottom: 16px;
            align-items: center;
        }

        .filters {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }

        .filter-button {
            border: 1px solid rgba(255, 255, 255, 0.3);
            background: rgba(255, 255, 255, 0.16);
            color: white;
            border-radius: 999px;
            padding: 7px 12px;
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.25s ease;
        }

        .filter-button:hover,
        .filter-button.active {
            background: rgba(255, 255, 255, 0.28);
            border-color: rgba(255, 255, 255, 0.55);
        }

        .search-box {
            flex: 1;
            min-width: 220px;
            padding: 10px 14px;
            border-radius: 10px;
            border: 1px solid rgba(255, 255, 255, 0.25);
            background: rgba(255, 255, 255, 0.2);
            color: white;
            font-size: 13px;
        }

        .search-box::placeholder {
            color: rgba(255, 255, 255, 0.65);
        }

        .search-box:focus {
            outline: none;
            border-color: rgba(255, 255, 255, 0.6);
            box-shadow: 0 0 12px rgba(255, 255, 255, 0.15);
        }

        .request-item {
            background: rgba(255, 255, 255, 0.1);
            padding: 20px;
            border-radius: 10px;
            border-left: 4px solid #ffc107;
        }

        .request-card.pending { border-left: 4px solid #ff9800; }
        .request-card.approved { border-left: 4px solid #4caf50; }
        .request-card.rejected { border-left: 4px solid #f44336; }
        .request-card.cancelled { border-left: 4px solid #9ca3af; }

        .request-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 15px;
        }

        .request-title {
            color: white;
            font-weight: 600;
            font-size: 16px;
        }

        .request-email {
            color: rgba(255, 255, 255, 0.7);
            font-size: 12px;
            margin-top: 5px;
        }

        .request-description {
            color: rgba(255, 255, 255, 0.8);
            font-size: 14px;
            margin-bottom: 15px;
            line-height: 1.5;
        }

        .request-meta {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            font-size: 12px;
            color: rgba(255, 255, 255, 0.6);
        }

        .request-actions {
            display: flex;
            gap: 10px;
        }

        .action-button {
            padding: 10px 16px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
            font-size: 13px;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .approve-button {
            background: rgba(76, 175, 80, 0.8);
            color: white;
        }

        .approve-button:hover {
            background: rgba(76, 175, 80, 1);
            transform: scale(1.05);
        }

        .reject-button {
            background: rgba(244, 67, 54, 0.8);
            color: white;
        }

        .reject-button:hover {
            background: rgba(244, 67, 54, 1);
            transform: scale(1.05);
        }

        .undo-button {
            background: rgba(255, 152, 0, 0.9);
            color: #fff;
            padding: 8px 12px;
            font-size: 12px;
        }

        .undo-button:hover {
            background: rgba(255, 152, 0, 1);
            transform: scale(1.04);
        }

        .undo-info {
            margin-top: 8px;
            color: #ffd180;
            font-size: 12px;
            font-weight: 600;
        }

        .empty-state {
            text-align: center;
            color: rgba(255, 255, 255, 0.6);
            padding: 50px 20px;
        }

        /* Message */
        .message {
            padding: 12px 16px;
            border-radius: 8px;
            margin-bottom: 20px;
            display: none;
        }

        .message.show {
            display: block;
        }

        .success {
            background: rgba(76, 175, 80, 0.2);
            color: #4caf50;
            border: 1px solid rgba(76, 175, 80, 0.4);
        }

        .warning {
            background: rgba(255, 152, 0, 0.2);
            color: #ffd180;
            border: 1px solid rgba(255, 152, 0, 0.4);
        }

        /* Summary Cards */
        .summary {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            margin-bottom: 30px;
        }

        .summary-card {
            background: rgba(255, 255, 255, 0.1);
            padding: 20px;
            border-radius: 10px;
            text-align: center;
            color: white;
        }

        .summary-number {
            font-size: 32px;
            font-weight: 700;
            margin-bottom: 5px;
        }

        .summary-label {
            font-size: 12px;
            color: rgba(255, 255, 255, 0.7);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .workflow-chain {
            margin: 10px 0;
            padding: 8px 10px;
            border-radius: 8px;
            background: rgba(255, 255, 255, 0.08);
            color: rgba(255, 255, 255, 0.9);
            font-size: 12px;
            line-height: 1.5;
        }

        .step {
            display: inline-block;
            padding: 5px 10px;
            border-radius: 20px;
            margin-right: 5px;
            margin-bottom: 4px;
            font-size: 12px;
            font-weight: 600;
        }

        .step.done { background: #4caf50; color: white; }
        .step.current { background: #ff9800; color: white; }
        .step.pending { background: #d1d5db; color: #111827; }

        .priority {
            padding: 4px 10px;
            border-radius: 12px;
            font-size: 11px;
            margin-left: 10px;
            font-weight: 700;
            letter-spacing: 0.4px;
        }

        .priority.high { background: #ef4444; color: white; }
        .priority.medium { background: #f59e0b; color: white; }
        .priority.low { background: #22c55e; color: white; }

        .status-message {
            margin-top: 10px;
            font-size: 13px;
            color: rgba(255, 255, 255, 0.92);
            font-weight: 600;
        }

        .request-comment {
            width: 100%;
            margin-top: 8px;
            padding: 10px;
            border-radius: 8px;
            border: 1px solid rgba(255, 255, 255, 0.25);
            background: rgba(255, 255, 255, 0.18);
            color: white;
            font-size: 13px;
        }

        .request-comment::placeholder {
            color: rgba(255, 255, 255, 0.65);
        }

        .history-preview {
            margin-top: 8px;
            font-size: 12px;
            color: rgba(255, 255, 255, 0.75);
        }

        .history-wrap {
            margin-top: 10px;
            padding-top: 8px;
            border-top: 1px dashed rgba(255, 255, 255, 0.2);
        }

        .history-item {
            font-size: 12px;
            margin: 3px 0;
            opacity: 0.85;
            color: rgba(255, 255, 255, 0.88);
        }

        .overdue {
            color: #ff6b6b;
            font-weight: 700;
            margin-left: 8px;
        }

        .escalated {
            color: #ffd166;
            font-size: 12px;
            margin-left: 8px;
            font-weight: 700;
        }

        .toolbar-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 10px;
            margin-bottom: 14px;
        }

        .export-button {
            background: rgba(255, 255, 255, 0.14);
            border: 1px solid rgba(255, 255, 255, 0.22);
            color: white;
            border-radius: 10px;
            padding: 8px 12px;
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
        }

        .export-button:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        /* Responsive */
        @media (max-width: 768px) {
            .navbar {
                flex-direction: column;
                text-align: center;
                gap: 15px;
            }

            .navbar-user {
                width: 100%;
                gap: 10px;
                justify-content: center;
            }

            .request-header {
                flex-direction: column;
            }

            .request-actions {
                flex-direction: column;
            }

            .action-button {
                width: 100%;
            }

            .summary {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <!-- Navigation Bar -->
    <div class="navbar">
        <div class="navbar-title" id="approver-title">Approver Dashboard</div>
        <div class="navbar-user">
            <div class="notification">🔔 <span id="notifCount" class="notif-count">0</span></div>
            <div class="user-info">
                <div id="welcomeText" class="welcome-text"></div>
                <div id="roleSummary" class="role-summary"></div>
            </div>
            <button class="logout-button" onclick="logout()">Logout</button>
        </div>
    </div>

    <!-- Main Content -->
    <div class="container">
        <!-- Summary -->
        <div class="card">
            <div class="summary">
                <div class="summary-card">
                    <div class="summary-number" id="pending-count">0</div>
                    <div class="summary-label">Pending Approvals</div>
                </div>
                <div class="summary-card">
                    <div class="summary-number" id="approved-count">0</div>
                    <div class="summary-label">Approved</div>
                </div>
                <div class="summary-card">
                    <div class="summary-number" id="rejected-count">0</div>
                    <div class="summary-label">Rejected</div>
                </div>
            </div>
        </div>

        <!-- Pending Requests -->
        <div class="card">
            <div class="toolbar-row">
                <h2 class="card-title" style="margin-bottom: 0;">Pending Approvals</h2>
                <button class="export-button" onclick="exportCSV()">Export</button>
            </div>
            <div id="message" class="message"></div>
            <div class="list-controls">
                <div class="filters">
                    <button class="filter-button active" data-filter="ALL" onclick="filterRequests('ALL')">All</button>
                    <button class="filter-button" data-filter="Pending" onclick="filterRequests('Pending')">Pending</button>
                    <button class="filter-button" data-filter="Approved" onclick="filterRequests('Approved')">Approved</button>
                    <button class="filter-button" data-filter="Rejected" onclick="filterRequests('Rejected')">Rejected</button>
                    <button class="filter-button" data-filter="Cancelled" onclick="filterRequests('Cancelled')">Cancelled</button>
                </div>
                <input type="text" id="searchBox" class="search-box" placeholder="Search requests..." oninput="renderRequests()" />
            </div>
            <div class="requests-list" id="requests-list">
                <div class="empty-state">No pending requests</div>
            </div>
        </div>
    </div>

    <script>
        let currentRole = 'Manager';
        let currentFilter = 'ALL';
        const UNDO_WINDOW_MS = 25000;
        const undoTimers = new Map();
        const REQUESTS_API_URL = 'http://localhost:5000/requests';

        // Initialize
        document.addEventListener('DOMContentLoaded', () => {
            checkAuthentication();
            displayUserRole();
            scheduleUndoExpiryForAll();
            loadRequests();
        });

        function readRequestsFromLocalStorage() {
            return JSON.parse(localStorage.getItem('requests') || '[]');
        }

        function writeRequestsToLocalStorage(requests, skipApiSync) {
            localStorage.setItem('requests', JSON.stringify(requests));
            if (!skipApiSync) {
                syncRequestsToApi(requests);
            }
        }

        function syncRequestsToApi(requests) {
            if (!Array.isArray(requests) || !requests.length) return;
            requests.forEach((req) => {
                fetch(REQUESTS_API_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(req),
                }).catch(() => {
                    // Keep local fallback behavior if backend is unavailable.
                });
            });
        }

        async function saveHistory(requestId, action, user) {
            if (!requestId) return;
            try {
                await fetch('http://localhost:4000/history', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        request_id: requestId,
                        action: action,
                        performed_by: user
                    })
                });
                console.log('History saved to DB');
            } catch (error) {
                console.log('History API failed, fallback only local history');
            }
        }

        function loadRequests() {
            fetch(REQUESTS_API_URL)
                .then((res) => {
                    if (!res.ok) {
                        throw new Error('API request failed');
                    }
                    return res.json();
                })
                .then((data) => {
                    const requests = Array.isArray(data) ? data : [];
                    writeRequestsToLocalStorage(requests, true);
                    renderRequests();
                })
                .catch(() => {
                    renderRequests();
                });
        }

        function normalizeStatus(status) {
            return String(status || '').trim().toLowerCase();
        }

        function canonicalRole(roleValue) {
            const raw = String(roleValue || '').trim().toLowerCase();
            if (raw === 'accounts') return 'Accounts';
            if (raw === 'manager') return 'Manager';
            if (raw === 'cfo') return 'CFO';
            if (raw === 'md') return 'MD';
            if (raw === 'admin') return 'Admin';
            return 'Employee';
        }

        function normalizeRequest(request) {
            const workflow = Array.isArray(request.workflow) ? request.workflow : [];
            const createdAt = Number(request.createdAt || Date.now());
            const currentLevel = Number(request.currentLevel || 0);
            return {
                ...request,
                amount: Number(request.amount || 0),
                workflow,
                currentLevel,
                status: normalizeStatus(request.status || 'pending'),
                createdAt,
                updatedAt: Number(request.updatedAt || createdAt),
                history: Array.isArray(request.history) ? request.history : [],
                comments: Array.isArray(request.comments) ? request.comments : [],
                lastActionTime: Number(request.lastActionTime || 0),
                undoAvailable: Boolean(request.undoAvailable),
                undoUsed: Boolean(request.undoUsed),
                lastAction: request.lastAction || null,
                lastActionType: String(request.lastActionType || ''),
                lastActionBy: String(request.lastActionBy || ''),
                lastActionSnapshot: request.lastActionSnapshot || null,
                deadline: Number(request.deadline || (createdAt + (24 * 60 * 60 * 1000))),
                escalated: Boolean(request.escalated),
                currentRole: request.currentRole || workflow[currentLevel] || '',
                fileName: request.fileName || null
            };
        }

        function getRequestCurrentRole(request) {
            const workflow = Array.isArray(request.workflow) ? request.workflow : [];
            const idx = Number(request.currentLevel || 0);
            return canonicalRole(request.currentRole || workflow[idx] || '');
        }

        function updateNotifications(requests, userRole) {
            const role = canonicalRole(userRole);
            const pending = requests.filter((r) => normalizeStatus(r.status) === 'pending' && getRequestCurrentRole(r) === role).length;
            const counter = document.getElementById('notifCount');
            if (counter) counter.innerText = String(pending);
        }

        function renderSummary(requests, role) {
            const normalizedRole = canonicalRole(role);
            let summary = '';

            if (normalizedRole === 'Employee') {
                const approved = requests.filter((r) => normalizeStatus(r.status) === 'approved').length;
                const pending = requests.filter((r) => normalizeStatus(r.status) === 'pending').length;
                summary = `Approved: ${approved} | Pending: ${pending}`;
            }

            if (normalizedRole !== 'Employee') {
                const pending = requests.filter((r) => getRequestCurrentRole(r) === normalizedRole && normalizeStatus(r.status) === 'pending').length;
                summary = `You have ${pending} approvals pending`;
            }

            const roleSummary = document.getElementById('roleSummary');
            if (roleSummary) roleSummary.innerText = summary;
        }

        function simulateEmail(action, role) {
            console.log(`Email sent to ${role || 'next approver'} for ${action}`);
        }

        function checkSLA(request) {
            return Number(request.deadline || 0) > 0 && Date.now() > Number(request.deadline);
        }

        function checkEscalation(request) {
            if (normalizeStatus(request.status) !== 'pending') return false;
            if (!checkSLA(request)) return false;
            const workflow = Array.isArray(request.workflow) ? request.workflow : [];
            const cfoIndex = workflow.findIndex((role) => canonicalRole(role) === 'CFO');
            if (cfoIndex === -1 || Number(request.currentLevel || 0) >= cfoIndex) return false;
            request.currentLevel = cfoIndex;
            request.currentRole = 'CFO';
            request.escalated = true;
            request.updatedAt = Date.now();
            return true;
        }

        function addHistory(request, action, user) {
            if (!Array.isArray(request.history)) request.history = [];
            request.history.push({
                action,
                user,
                role: user,
                status: action,
                time: Date.now()
            });
        }

        // Check if user is logged in and is an approver
        function checkAuthentication() {
            const currentUser = JSON.parse(localStorage.getItem('currentUser') || 'null');
            const userRole = (currentUser && currentUser.role) || localStorage.getItem('role') || localStorage.getItem('userRole');
            currentRole = canonicalRole(userRole);
            const approverRoles = ['Accounts', 'Manager', 'CFO', 'MD'];

            if (!currentUser && !userRole) {
                window.location.href = 'login.html';
                return;
            }

            if (!approverRoles.includes(currentRole)) {
                window.location.href = 'login.html';
                return;
            }

            localStorage.setItem('role', currentRole);
            localStorage.setItem('userRole', String(currentRole).toLowerCase());
        }

        // Display user role
        function displayUserRole() {
            const currentUser = JSON.parse(localStorage.getItem('currentUser') || 'null');
            const roleForDisplay = currentUser && currentUser.role ? canonicalRole(currentUser.role) : currentRole;
            const titleElement = document.getElementById('approver-title');
            const welcomeText = document.getElementById('welcomeText');
            if (titleElement) {
                titleElement.textContent = `${roleForDisplay} Dashboard`;
            }
            if (welcomeText) {
                welcomeText.textContent = `Welcome ${roleForDisplay}`;
            }
        }

        // Load pending requests
        async function renderRequests() {
            const requests = readRequestsFromLocalStorage().map(normalizeRequest);
            let hasEscalationChanges = false;
            for (const r of requests) {
                if (checkEscalation(r)) {
                    hasEscalationChanges = true;
                    addHistory(r, 'Escalated to CFO', 'System');
                    await saveHistory(r.id, 'Escalated', 'System');
                    simulateEmail('escalation', 'CFO');
                }
            }
            if (hasEscalationChanges) {
                writeRequestsToLocalStorage(requests);
            }

            updateNotifications(requests, currentRole);
            renderSummary(requests, currentRole);
            const pendingRequests = requests.filter((r) => {
                if (normalizeStatus(r.status) !== 'pending') return false;
                const currentStepRole = canonicalRole((r.workflow || [])[r.currentLevel]);
                return currentStepRole === currentRole;
            });

            const undoRequests = requests.filter((r) => isUndoWindowOpen(r));
            const combinedRequests = [...pendingRequests];
            undoRequests.forEach((r) => {
                if (!combinedRequests.some((x) => Number(x.id) === Number(r.id))) {
                    combinedRequests.push(r);
                }
            });

            // Update summary
            updateSummary(requests, pendingRequests);

            const requestsList = document.getElementById('requests-list');

            const filteredRequests = combinedRequests
                .filter((r) => currentFilter === 'ALL' || toStatusLabel(r.status) === currentFilter)
                .filter(matchesSearch);

            updateActiveFilterButtons();

            if (combinedRequests.length === 0) {
                requestsList.innerHTML = '<div class="empty-state">No pending requests. All requests have been reviewed.</div>';
                return;
            }

            if (filteredRequests.length === 0) {
                requestsList.innerHTML = '<div class="empty-state">No requests match current filter/search.</div>';
                return;
            }

            requestsList.innerHTML = filteredRequests.map((request) => {
                const currentLevel = (request.workflow || [])[request.currentLevel] || 'N/A';
                const assignedRole = canonicalRole((request.workflow || [])[request.currentLevel]);
                const canAct = normalizeStatus(request.status) === 'pending' && assignedRole === currentRole;
                const undoOpen = isUndoWindowOpen(request);
                const countdown = getUndoSecondsLeft(request);
                return `
                <div class="request-item request-card ${normalizeStatus(request.status)}">
                    <div class="request-header">
                        <div>
                            <div class="request-title">${escapeHtml(request.title)} ${renderPriority(request.amount)}</div>
                            <div class="request-email">From: ${escapeHtml(request.email)}</div>
                        </div>
                    </div>
                    <div class="request-description">${escapeHtml(request.description)}</div>
                    <div class="request-meta">
                        <span>Amount: ${formatCurrency(request.amount)}</span>
                        <span>Current: ${escapeHtml(currentLevel)}</span>
                    </div>
                    ${request.fileName ? `<div class="request-meta"><span>📎 ${escapeHtml(request.fileName)}</span></div>` : ''}
                    <div class="status-message">${escapeHtml(getStatusMessage(request))}</div>
                    <div class="request-meta">${checkSLA(request) ? '<span class="overdue">⚠ Overdue</span>' : ''}${request.escalated ? '<span class="escalated">🚨 Escalated to CFO</span>' : ''}</div>
                    <div class="workflow-chain">
                        ${renderWorkflowTimeline(request.workflow, request.currentLevel, request.status)}
                    </div>
                    <div class="history-wrap">
                        ${renderHistory(request.history)}
                    </div>
                    <textarea id="comment-${request.id}" class="request-comment" placeholder="Add comment before action (optional)"></textarea>
                    <div class="request-actions">
                        ${canAct ? `<button class="action-button approve-button" onclick="approveRequest(${request.id})">
                            ✓ Approve
                        </button>` : ''}
                        ${canAct ? `<button class="action-button reject-button" onclick="rejectRequest(${request.id})">
                            ✕ Reject
                        </button>` : ''}
                        ${undoOpen ? `<button class="action-button undo-button" onclick="undoAction(${request.id})">Undo (${countdown}s)</button>` : ''}
                    </div>
                    ${undoOpen ? `<div class="undo-info">Action applied. Undo available for ${countdown} seconds</div>` : ''}
                </div>
            `;
            }).join('');

        }

        function loadPendingRequests() {
            renderRequests();
        }

        function filterRequests(status) {
            currentFilter = status;
            renderRequests();
        }

        function matchesSearch(request) {
            const input = document.getElementById('searchBox');
            const q = String(input ? input.value : '').toLowerCase().trim();
            if (!q) return true;
            const title = String(request.title || '').toLowerCase();
            const type = String(request.type || '').toLowerCase();
            const email = String(request.email || '').toLowerCase();
            return title.includes(q) || type.includes(q) || email.includes(q);
        }

        function updateActiveFilterButtons() {
            const buttons = document.querySelectorAll('.filter-button');
            buttons.forEach((btn) => {
                if (btn.dataset.filter === currentFilter) {
                    btn.classList.add('active');
                } else {
                    btn.classList.remove('active');
                }
            });
        }

        function toStatusLabel(status) {
            const n = normalizeStatus(status);
            if (!n) return 'Pending';
            return `${n.charAt(0).toUpperCase()}${n.slice(1)}`;
        }

        function getPriority(amount) {
            if (!amount) return 'LOW';
            if (Number(amount) > 100000) return 'HIGH';
            if (Number(amount) > 50000) return 'MEDIUM';
            return 'LOW';
        }

        function renderPriority(amount) {
            const p = getPriority(amount);
            return `<span class="priority ${p.toLowerCase()}">${p}</span>`;
        }

        function getStatusMessage(request) {
            const status = toStatusLabel(request.status);
            if (status === 'Approved') return 'Fully Approved';
            if (status === 'Rejected') return 'Rejected';
            if (status === 'Cancelled') return 'Cancelled';
            const workflow = Array.isArray(request.workflow) ? request.workflow : [];
            const waitingRole = workflow[request.currentLevel] || 'next approver';
            return `Waiting for ${waitingRole}`;
        }

        function renderWorkflowTimeline(workflow, currentIndex, status) {
            const normalizedWorkflow = Array.isArray(workflow) ? workflow : [];
            const normalizedStatus = normalizeStatus(status);
            return normalizedWorkflow.map((role, index) => {
                const doneByStatus = normalizedStatus === 'approved' || (normalizedStatus === 'cancelled' && index < currentIndex);
                if (index < currentIndex || doneByStatus) {
                    return `<span class="step done">✔ ${escapeHtml(role)}</span>`;
                }
                if (index === currentIndex && normalizedStatus === 'pending') {
                    return `<span class="step current">⏳ ${escapeHtml(role)}</span>`;
                }
                if (index === currentIndex && normalizedStatus === 'rejected') {
                    return `<span class="step current">✕ ${escapeHtml(role)}</span>`;
                }
                return `<span class="step pending">○ ${escapeHtml(role)}</span>`;
            }).join(' → ');
        }

        function renderHistory(history) {
            if (!Array.isArray(history) || history.length === 0) {
                return '<div class="history-item">No approval history yet.</div>';
            }
            return history.map((h) => {
                const action = String(h.status || h.action || 'Updated');
                const actor = h.role || h.user || 'System';
                return `<div class="history-item">✔ ${escapeHtml(actor)} ${escapeHtml(action)} (${timeAgo(h.time)})</div>`;
            }).join('');
        }

        // Approve request
        function approveRequest(requestId) {
            if (!confirm('Are you sure you want to approve?')) {
                return;
            }
            updateRequestStatus(requestId, 'approved');
        }

        // Reject request
        function rejectRequest(requestId) {
            if (!confirm('Are you sure you want to reject?')) {
                return;
            }
            updateRequestStatus(requestId, 'rejected');
        }

        // Update request status
        async function updateRequestStatus(requestId, status) {
            const requests = readRequestsFromLocalStorage().map(normalizeRequest);
            const requestIndex = requests.findIndex(r => Number(r.id) === Number(requestId));
            if (requestIndex === -1) return;

            const request = requests[requestIndex];
            const assignedRole = canonicalRole((request.workflow || [])[request.currentLevel]);

            if (assignedRole !== currentRole || normalizeStatus(request.status) !== 'pending') {
                showMessage('This request is no longer assigned to your role.', 'success');
                renderRequests();
                return;
            }

            const commentEl = document.getElementById(`comment-${request.id}`);
            const comment = commentEl ? commentEl.value.trim() : '';
            const now = Date.now();
            const actionStatus = normalizeStatus(status) === 'approved' ? 'Approved' : 'Rejected';
            const snapshot = {
                status: request.status,
                currentLevel: request.currentLevel,
                updatedAt: request.updatedAt,
                historyLength: request.history.length,
                commentsLength: request.comments.length
            };

            request.comments.push({ role: currentRole, comment: comment || actionStatus, time: now });
            request.updatedAt = now;

            if (normalizeStatus(status) === 'approved') {
                request.currentLevel += 1;
                if (request.currentLevel >= request.workflow.length) {
                    request.status = 'approved';
                    request.currentLevel = Math.max(0, request.workflow.length - 1);
                } else {
                    request.status = 'pending';
                    request.currentRole = (request.workflow || [])[request.currentLevel] || request.currentRole;
                    simulateEmail('approval', request.currentRole);
                }
            } else {
                request.status = 'rejected';
            }

            addHistory(request, actionStatus, currentRole);
            await saveHistory(request.id, actionStatus, currentRole);

            request.lastActionTime = now;
            request.lastAction = normalizeStatus(status);
            request.undoAvailable = request.undoUsed === false;
            request.lastActionType = normalizeStatus(status);
            request.lastActionBy = currentRole;
            request.lastActionSnapshot = snapshot;

            requests[requestIndex] = request;
            writeRequestsToLocalStorage(requests);
            scheduleUndoExpiryForRequest(request.id, now);

            showMessage(`Action applied. Undo available for 25 seconds.`, 'warning');
            renderRequests();

            setTimeout(() => {
                document.getElementById('message').classList.remove('show');
            }, 3000);
        }

        function isUndoWindowOpen(request) {
            if (!request.undoAvailable || !request.lastActionTime) return false;
            if (request.undoUsed) return false;
            if (canonicalRole(request.lastActionBy) !== currentRole) return false;
            if ((Date.now() - Number(request.lastActionTime)) > UNDO_WINDOW_MS) return false;
            if (hasNextLevelStarted(request)) return false;
            return true;
        }

        function hasNextLevelStarted(request) {
            return (request.history || []).some((h) => Number(h.time || 0) > Number(request.lastActionTime || 0) && canonicalRole(h.role) !== currentRole);
        }

        function getUndoSecondsLeft(request) {
            const elapsed = Date.now() - Number(request.lastActionTime || 0);
            return Math.max(0, Math.ceil((UNDO_WINDOW_MS - elapsed) / 1000));
        }

        function undoAction(requestId) {
            const requests = readRequestsFromLocalStorage().map(normalizeRequest);
            const index = requests.findIndex((r) => Number(r.id) === Number(requestId));
            if (index === -1) return;

            const request = requests[index];
            if (request.undoUsed) {
                alert('Undo already used');
                return;
            }
            if (!isUndoWindowOpen(request)) {
                alert('Undo time expired');
                request.undoAvailable = false;
                requests[index] = request;
                writeRequestsToLocalStorage(requests);
                renderRequests();
                return;
            }

            const snapshot = request.lastActionSnapshot;
            if (!snapshot) {
                request.undoAvailable = false;
                requests[index] = request;
                writeRequestsToLocalStorage(requests);
                renderRequests();
                return;
            }

            request.status = normalizeStatus(snapshot.status || 'pending');
            request.currentLevel = Number(snapshot.currentLevel || 0);
            request.updatedAt = Date.now();
            request.history = request.history.slice(0, Number(snapshot.historyLength || 0));
            request.comments = request.comments.slice(0, Number(snapshot.commentsLength || 0));
            request.undoAvailable = false;
            request.undoUsed = true;
            request.lastActionTime = 0;
            request.lastAction = null;
            request.lastActionType = '';
            request.lastActionBy = '';
            request.lastActionSnapshot = null;

            requests[index] = request;
            writeRequestsToLocalStorage(requests);
            clearUndoTimer(request.id);
            showMessage('Action was undone successfully.', 'success');
            renderRequests();
        }

        function clearUndoTimer(requestId) {
            if (undoTimers.has(requestId)) {
                clearTimeout(undoTimers.get(requestId));
                undoTimers.delete(requestId);
            }
        }

        function scheduleUndoExpiryForRequest(requestId, actionTime) {
            clearUndoTimer(requestId);
            const remaining = UNDO_WINDOW_MS - (Date.now() - Number(actionTime || 0));
            if (remaining <= 0) {
                expireUndo(requestId, actionTime);
                return;
            }

            const timer = setTimeout(() => {
                expireUndo(requestId, actionTime);
            }, remaining);
            undoTimers.set(requestId, timer);
        }

        function expireUndo(requestId, actionTime) {
            const requests = readRequestsFromLocalStorage().map(normalizeRequest);
            const index = requests.findIndex((r) => Number(r.id) === Number(requestId));
            if (index === -1) return;

            const request = requests[index];
            if (Number(request.lastActionTime || 0) !== Number(actionTime || 0)) return;
            if (!request.undoAvailable) return;

            request.undoAvailable = false;
            requests[index] = request;
            writeRequestsToLocalStorage(requests);
            clearUndoTimer(requestId);
            renderRequests();
        }

        function scheduleUndoExpiryForAll() {
            const requests = readRequestsFromLocalStorage().map(normalizeRequest);
            requests.forEach((request) => {
                if (request.undoUsed) {
                    request.undoAvailable = false;
                    return;
                }
                if (request.undoAvailable && request.lastActionTime) {
                    if (hasNextLevelStarted(request)) {
                        request.undoAvailable = false;
                    } else {
                        scheduleUndoExpiryForRequest(request.id, request.lastActionTime);
                    }
                }
            });
            writeRequestsToLocalStorage(requests);
        }

        // Update summary counts
        function updateSummary(requests, assignedPending) {
            const pending = assignedPending.length;
            const approved = requests.filter(r => normalizeStatus(r.status) === 'approved').length;
            const rejected = requests.filter(r => normalizeStatus(r.status) === 'rejected').length;

            document.getElementById('pending-count').textContent = pending;
            document.getElementById('approved-count').textContent = approved;
            document.getElementById('rejected-count').textContent = rejected;
        }

        function timeAgo(timestamp) {
            const diffSeconds = Math.max(0, Math.floor((Date.now() - Number(timestamp || Date.now())) / 1000));
            if (diffSeconds < 60) return `${diffSeconds}s ago`;
            const mins = Math.floor(diffSeconds / 60);
            if (mins < 60) return `${mins} min${mins === 1 ? '' : 's'} ago`;
            const hours = Math.floor(mins / 60);
            if (hours < 24) return `${hours} hour${hours === 1 ? '' : 's'} ago`;
            const days = Math.floor(hours / 24);
            return `${days} day${days === 1 ? '' : 's'} ago`;
        }

        function formatCurrency(amount) {
            return `$${Number(amount || 0).toLocaleString(undefined, { maximumFractionDigits: 2 })}`;
        }

        function exportCSV() {
            const requests = readRequestsFromLocalStorage().map(normalizeRequest);
            let csv = 'Title,Status,Amount\n';
            requests.forEach((r) => {
                csv += `${String(r.title || '').replace(/,/g, ' ')},${toStatusLabel(r.status)},${Number(r.amount || 0)}\n`;
            });

            const blob = new Blob([csv], { type: 'text/csv' });
            const a = document.createElement('a');
            a.href = URL.createObjectURL(blob);
            a.download = 'requests.csv';
            a.click();
            URL.revokeObjectURL(a.href);
        }

        // Show message
        function showMessage(text, type) {
            const messageEl = document.getElementById('message');
            messageEl.textContent = text;
            messageEl.className = `message show ${type}`;
        }

        // Escape HTML to prevent XSS
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // Logout
        function logout() {
            localStorage.removeItem('authToken');
            localStorage.removeItem('role');
            localStorage.removeItem('userRole');
            localStorage.removeItem('userEmail');
            window.location.href = 'login.html';
        }
    </script>
</body>
</html>
